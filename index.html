<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Commander Simulator</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="./favicon.svg" />
  </head>
  <body>
    <div class="info-banner" id="infoBanner" role="note">
      <span>Export your Commander deck from ManaBox as a Text (.txt) file, then upload Deck 1 and Deck 2 to run the simulation.</span>
      <button id="dismissInfoBannerBtn" type="button" aria-label="Dismiss info banner">×</button>
    </div>
    <main class="table-wrap" id="tableWrap">
      
      <div class="table-controls">
          <div class="control-row row-top">
            <button id="manualP1Btn" aria-pressed="false" aria-label="Manual play for Player 1">Manual P1</button>
            <button id="manualP2Btn" aria-pressed="false" aria-label="Manual play for Player 2">Manual P2</button>
            <button id="enableAudioBtn" aria-pressed="false" aria-label="Enable audio">Enable Audio</button>
            <button id="startBtn" aria-label="Start simulation">Start</button>
            <button id="pauseBtn" aria-label="Pause simulation">Pause</button>
            <button id="resetBtn" aria-label="Reset simulation">Reset</button>
          <label class="sim-count-label">Runs: <input id="simCountInput" type="number" min="1" value="1" /></label>
          <label class="silent-label"><input id="silentRunCheckbox" type="checkbox" /> Silent runs (fast)</label>
          <button id="slowerBtn">Slower</button>
          <button id="fasterBtn">Faster</button>
          <span id="speedBadge">Speed: 1400ms</span>
          <span id="audioBadge">Audio: Locked</span>
        </div>

        <div class="control-row row-bottom">
          <div class="deck-control">
            <button id="uploadDeck1Btn" aria-label="Upload deck one">Upload Deck 1</button>
            <input id="deck1FileInput" type="file" accept=".txt" hidden />
            <span id="deck1Badge">Deck 1: Not loaded</span>
            <span id="deck1Wins" class="win-badge">Wins: 0</span>
          </div>

          <div class="deck-control">
            <button id="uploadDeck2Btn" aria-label="Upload deck two">Upload Deck 2</button>
            <input id="deck2FileInput" type="file" accept=".txt" hidden />
            <span id="deck2Badge">Deck 2: Not loaded</span>
            <span id="deck2Wins" class="win-badge">Wins: 0</span>
          </div>
        </div>
      </div>
      <div class="batch-progress-wrap" id="batchProgressWrap">
        <label id="batchProgressLabel">Batch Progress:</label>
        <progress id="batchProgress" max="100" value="0" hidden></progress>
      </div>
      <div class="move-console" id="moveConsole" aria-live="polite">No moves yet.</div>
      <div class="table-meta" id="metaStats">Loading simulation...</div>
      <div class="players" id="playersView"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
